openapi: 3.0.3
info:
  title: DeadlinePilot AI REST API
  description: The production-ready MERN backend API for the DeadlinePilot AI Assistant. Supports tasks CRUD, calendar slot allocation, AI briefings, and context-aware reminders.
  version: 1.0.0
servers:
  - url: http://localhost:8000
    description: Local development server
paths:
  /:
    get:
      summary: Health Check
      description: Returns service status and Firebase Admin active config flag.
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: online
                  service:
                    type: string
                    example: DeadlinePilot AI Backend API
                  firebaseAdminActive:
                    type: boolean
                    example: true
                  timestamp:
                    type: string
                    example: "2026-06-30T00:37:20Z"
  /api/tasks:
    get:
      summary: Get user tasks
      security:
        - BearerAuth: []
      responses:
        '200':
          description: List of tasks
    post:
      summary: Create new task
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - title
                - deadline
              properties:
                title:
                  type: string
                description:
                  type: string
                deadline:
                  type: string
                  format: date-time
                estimatedHours:
                  type: number
                priority:
                  type: string
                  enum: [Critical, High, Medium, Low]
                category:
                  type: string
                tags:
                  type: array
                  items:
                    type: string
      responses:
        '201':
          description: Task created with AI priority and planner breakdown
  /api/tasks/{id}:
    get:
      summary: Get task details
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Task details
    put:
      summary: Update task details
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Task updated
    delete:
      summary: Delete task
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Task deleted
  /api/ai/schedule-task/{taskId}:
    post:
      summary: Automatically schedule task
      parameters:
        - name: taskId
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Task scheduled in optimal free calendar slot
  /api/ai/reminder/{taskId}:
    post:
      summary: Generate motivational reminder
      parameters:
        - name: taskId
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Smart motivational nudge generated
  /api/ai/brief:
    get:
      summary: Get daily briefing
      parameters:
        - name: type
          in: query
          required: false
          schema:
            type: string
            enum: [morning, evening]
            default: morning
      responses:
        '200':
          description: Morning summary or Evening report generated by Gemini
  /api/ai/chat:
    post:
      summary: Interactive AI drawer chat
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - message
              properties:
                message:
                  type: string
                timezoneOffset:
                  type: integer
      responses:
        '200':
          description: AI parsed actions and textual reply
  /api/ai/natural-add:
    post:
      summary: Voice quick-add NLP
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - text
              properties:
                text:
                  type: string
      responses:
        '201':
          description: Task created and scheduled via voice parser
  /api/ai/extension-email/{taskId}:
    post:
      summary: Generate missed deadline extension request email
      parameters:
        - name: taskId
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Email subject and body generated by Gemini
components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
